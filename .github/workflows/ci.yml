name: ci

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'
      - run: dotnet restore RescueClone.sln
      - run: dotnet build RescueClone.sln -c Release --no-restore
      - run: dotnet test RescueClone.sln -c Release --no-build
