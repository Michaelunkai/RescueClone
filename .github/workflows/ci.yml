name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  windows-portable:
    name: Windows portable build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.301

      - name: Install MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc

      - name: Build and publish
        shell: pwsh
        run: .\scripts\Build-Portable.ps1 -AllowSystemDotNetFallback -NativeCompilerPath C:\msys64\mingw64\bin\g++.exe

      - name: Portable smoke test
        shell: pwsh
        run: .\scripts\Test-Portable.ps1

      - name: Portable operation service smoke test
        shell: pwsh
        run: .\scripts\Test-PortableOperationService.ps1

      - name: Portable install smoke test
        shell: pwsh
        run: .\scripts\Test-PortableInstall.ps1

      - name: Build portable package
        shell: pwsh
        run: .\scripts\New-PortablePackage.ps1 -OutputPath .\artifacts\RescueClone-portable.zip -Force

      - name: Verify package contents
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath .\artifacts\RescueClone-portable.zip)) {
            throw 'Missing portable package.'
          }
          if (-not (Test-Path -LiteralPath .\artifacts\RescueClone-portable.zip.sha256)) {
            throw 'Missing portable package checksum.'
          }

      - name: Upload portable package
        uses: actions/upload-artifact@v4
        with:
          name: RescueClone-portable
          path: |
            artifacts/RescueClone-portable.zip
            artifacts/RescueClone-portable.zip.sha256
